# 数据能力脚手架本机查询配置模板
#
# 使用方式：
# 1. 复制本文件到 .gstack/data-access/config.local.yaml
# 2. 填入项目内发放的开发期只读账号
# 3. 默认不要提交 .gstack/data-access/config.local.yaml；内部协作项目经 owner 明确授权时可提交共享只读配置

clickhouse:
  default:
    host:
    port: 9000
    database:
    user:
    password:
    secure: false
    readonly: true

mysql:
  default:
    host:
    port: 3306
    database:
    user:
    password:
    readonly: true

metabase:
  default:
    base_url:
    username:
    password:
    api_key:
    session_id:
    readonly: true
